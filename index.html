<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Hub Generator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #0f172a;
      color: #ffffff;
      padding: 20px;
    }

    /* Container for both Editor and Bio View */
    .container {
      width: 100%;
      max-width: 480px;
    }

    /* Form & Card Styles */
    .card {
      background: #1e293b;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h1, h2 {
      margin-bottom: 16px;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 12px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px 14px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      font-size: 0.95rem;
    }

    .link-group {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    .btn-secondary {
      background: #334155;
    }

    .btn-secondary:hover {
      background: #475569;
    }

    /* Generated URL Box */
    .result-box {
      margin-top: 16px;
      word-break: break-all;
      background: #0f172a;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #38bdf8;
      display: none;
    }

    /* Live Bio View Page Styles */
    .bio-view {
      text-align: center;
      display: none;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 12px;
      border: 3px solid rgba(255, 255, 255, 0.2);
    }

    .bio-text {
      color: #cbd5e1;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .btn-link {
      display: block;
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      backdrop-filter: blur(5px);
      transition: transform 0.2s, background 0.2s;
    }

    .btn-link:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div id="editor" class="card">
      <h1>Create Your Bio Page</h1>
      
      <label>Display Name</label>
      <input type="text" id="name" placeholder="e.g. Alex Smith">

      <label>Bio</label>
      <textarea id="bio" rows="2" placeholder="Digital Creator & Developer"></textarea>

      <label>Profile Image URL</label>
      <input type="url" id="avatar" placeholder="https://via.placeholder.com/150">

      <label>Background Color</label>
      <input type="color" id="bgColor" value="#0f172a">

      <label>Links</label>
      <div id="links-container">
        <div class="link-group">
          <input type="text" placeholder="Title (e.g. YouTube)" class="link-title">
          <input type="url" placeholder="URL" class="link-url">
        </div>
      </div>

      <button type="button" class="btn-secondary" onclick="addLinkField()">+ Add Another Link</button>
      <button type="button" onclick="generateLink()">Generate Shareable Link</button>

      <div id="result" class="result-box"></div>
    </div>

    <div id="bioView" class="bio-view">
      <img id="viewAvatar" class="avatar" src="" alt="Profile Photo">
      <h1 id="viewName"></h1>
      <p id="viewBio" class="bio-text"></p>
      <div id="viewLinks"></div>
    </div>

  </div>

  <script>
    // Add dynamic input field for extra links
    function addLinkField() {
      const container = document.getElementById('links-container');
      const div = document.createElement('div');
      div.className = 'link-group';
      div.innerHTML = `
        <input type="text" placeholder="Title" class="link-title">
        <input type="url" placeholder="URL" class="link-url">
      `;
      container.appendChild(div);
    }

    // Encodes form state into Base64 JSON and constructs the URL
    function generateLink() {
      const titles = document.querySelectorAll('.link-title');
      const urls = document.querySelectorAll('.link-url');
      const links = [];

      titles.forEach((titleEl, idx) => {
        if (titleEl.value && urls[idx].value) {
          links.push({ title: titleEl.value, url: urls[idx].value });
        }
      });

      const profileData = {
        name: document.getElementById('name').value || 'Anonymous',
        bio: document.getElementById('bio').value || '',
        avatar: document.getElementById('avatar').value || 'https://via.placeholder.com/150',
        bgColor: document.getElementById('bgColor').value,
        links: links
      };

      // Convert JSON object to a Base64 string
      const jsonString = JSON.stringify(profileData);
      const encodedData = btoa(encodeURIComponent(jsonString));

      // Build output share URL
      const shareUrl = window.location.origin + window.location.pathname + '#data=' + encodedData;

      const resultBox = document.getElementById('result');
      resultBox.style.display = 'block';
      resultBox.innerHTML = `<strong>Your Link:</strong><br><a href="${shareUrl}" target="_blank" style="color:#38bdf8">${shareUrl}</a>`;
    }

    // Checks if the URL contains encoded profile data on page load
    function loadProfileFromUrl() {
      const hash = window.location.hash;
      
      if (hash.startsWith('#data=')) {
        try {
          // Decode Base64 back into JSON
          const encodedData = hash.replace('#data=', '');
          const jsonString = decodeURIComponent(atob(encodedData));
          const profile = JSON.parse(jsonString);

          // Hide editor, display bio page
          document.getElementById('editor').style.display = 'none';
          document.getElementById('bioView').style.display = 'block';
          document.body.style.backgroundColor = profile.bgColor || '#0f172a';

          // Populate bio view elements
          document.getElementById('viewName').innerText = profile.name;
          document.getElementById('viewBio').innerText = profile.bio;
          document.getElementById('viewAvatar').src = profile.avatar;

          const linksContainer = document.getElementById('viewLinks');
          linksContainer.innerHTML = '';

          profile.links.forEach(link => {
            const a = document.createElement('a');
            a.className = 'btn-link';
            a.href = link.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.innerText = link.title;
            linksContainer.appendChild(a);
          });

        } catch (err) {
          console.error("Failed to parse page data from URL", err);
        }
      }
    }

    // Run URL check on load
    window.addEventListener('DOMContentLoaded', loadProfileFromUrl);
  </script>
</body>
</html>
